services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arohan-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:-arohan-prod-secret-2026}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://haspranahealth.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-info@haspranahealth.com}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
    command: node src/index.js

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/v1
    container_name: arohan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    driver: local

networks:
  default:
    name: arohan-network
