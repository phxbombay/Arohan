services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: arohan-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: arohan_health_db
      MYSQL_USER: arohan_user
      MYSQL_PASSWORD: arohan_password
      MYSQL_ROOT_PASSWORD: root_secure_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema_mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arohan-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/v1
    container_name: arohan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  default:
    name: arohan-network
