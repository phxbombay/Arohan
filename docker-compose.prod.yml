services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arohan-backend
    restart: always
    env_file: .env.production
    ports:
      - "5000:5000"
    networks:
      - arohan-network
    # Production: Don't mount source code volumes
    # Application runs from Docker image
    command: node src/index.js

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: arohan-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - arohan-network
    volumes:
      # Mount SSL certificates (if using Let's Encrypt)
      - ./ssl:/etc/nginx/ssl:ro

networks:
  arohan-network:
    driver: bridge
