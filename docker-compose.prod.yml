version: '3.8'

services:
  # Backend API - connects to RDS MySQL in production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arohan-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "5000:5000"

  # Frontend (Nginx + React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/v1
    container_name: arohan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  default:
    name: arohan-network
