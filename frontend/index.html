  <!-- NUCLEAR: Clear broken caches once to resolve white screen, then allow new service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      // Check if we already did a major clear today to avoid infinite loops
      const lastClear = localStorage.getItem('arohan_sw_clear_v1');
      const now = Date.now();
      if (!lastClear || (now - parseInt(lastClear)) > 86400000) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for(let reg of regs) reg.unregister();
        });
        if ('caches' in window) {
          caches.keys().then(function(n) {
            n.forEach(function(name) { caches.delete(name) });
          });
        }
        localStorage.setItem('arohan_sw_clear_v1', now.toString());
        console.log('Emergency SW Clear Triggered');
      }
    }
  </script>
